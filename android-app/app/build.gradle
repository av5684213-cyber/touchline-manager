plugins {
    id "com.android.application"
}
android {
    namespace "com.touchline.manager"
    compileSdk 34
    defaultConfig {
        applicationId "com.touchline.manager"
        minSdk 24
        targetSdk 34
        versionCode 293
        versionName "2.9.3"
    }
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
    aaptOptions {
        // v2.9.11: _next/ klasörünü ATLAMA — Next.js statik dosyaları burada
        // Eski pattern: ".*" → _next/ ve tüm gizli dosyaları atlıyordu
        // Yeni: sadece gerçekten gereksiz dosyaları atla
        ignoreAssetsPattern ".svn:.git:.ds_store:*.scc:CVS:thumbs.db:picasa.ini:*.bak"
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
    }
}
