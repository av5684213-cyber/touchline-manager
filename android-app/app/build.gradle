plugins {
    id "com.android.application"
}
android {
    namespace "com.touchline.manager"
    compileSdk 34
    defaultConfig {
        applicationId "com.touchline.manager"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
    }
}
