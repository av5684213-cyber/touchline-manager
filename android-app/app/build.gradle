plugins {
    id "com.android.application"
}
android {
    namespace "com.touchline.manager"
    compileSdk 34
    defaultConfig {
        applicationId "com.touchline.manager"
        minSdk 24
        targetSdk 34
        versionCode 300
        versionName "2.9.12"
    }
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
    aaptOptions {
        // v2.9.12: Tüm ignoreAssetsPattern KALDIRILDI — _next/ dahil hiçbir dosya atlanmasın
        // Eski pattern ".*" _next/ klasörünü atlıyordu, bu da APK'yı 973KB yapıyordu
        noCompress "html", "js", "css", "json", "txt", "svg", "woff", "woff2", "ttf"
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
            // Assets sıkıştırma kapalı — web dosyaları bozulmasın
            crunchPngs false
        }
    }
}
