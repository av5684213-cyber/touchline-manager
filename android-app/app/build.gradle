plugins {
    id "com.android.application"
}
android {
    namespace "com.touchline.manager"
    compileSdk 34
    defaultConfig {
        applicationId "com.touchline.manager"
        minSdk 24
        targetSdk 34
        versionCode 293
        versionName "2.9.3"
    }
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
    aaptOptions {
        // Varsayılan pattern _* ile başlayan klasörleri (Next.js _next/) atlıyor!
        // Sadece gerçekten gereksiz dosyaları hariç tut.
        ignoreAssetsPattern ".svn:.git:.ds_store:*.scc:.*:CVS:thumbs.db:picasa.ini:*.bak"
    }
    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
    }
}
