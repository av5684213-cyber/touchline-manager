name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - run: yes | sdkmanager --licenses || true
    - run: sdkmanager "build-tools;34.0.0" "platforms;android-34"
    
    - name: Install Gradle
      run: |
        cd /tmp
        curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
        unzip -qo gradle.zip
        /tmp/gradle-8.7/bin/gradle --version

    - name: Create Android Project
      run: |
        DIR=android-app/app/src/main
        mkdir -p $DIR/res/values
        mkdir -p $DIR/res/mipmap-anydpi-v26
        mkdir -p $DIR/res/mipmap-hdpi
        
        printf 'pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\nrootProject.name = "TouchlineManager"\ninclude ":app"\n' > android-app/settings.gradle
        
        printf 'plugins {\n    id "com.android.application" version "8.2.0" apply false\n}\n' > android-app/build.gradle
        
        printf 'plugins {\n    id "com.android.application"\n}\nandroid {\n    namespace "com.touchline.manager"\n    compileSdk 34\n    defaultConfig {\n        applicationId "com.touchline.manager"\n        minSdk 24\n        targetSdk 34\n        versionCode 1\n        versionName "1.0.0"\n    }\n    buildTypes {\n        release {\n            minifyEnabled false\n            signingConfig signingConfigs.debug\n        }\n    }\n}\ndependencies {\n    implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"\n}\n' > android-app/app/build.gradle
        
        printf 'android.useAndroidX=true\norg.gradle.jvmargs=-Xmx2048m\norg.gradle.daemon=false\n' > android-app/gradle.properties
        
        printf '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <application\n        android:label="Touchline Manager"\n        android:icon="@mipmap/ic_launcher"\n        android:theme="@android:style/Theme.Translucent.NoTitleBar"\n        android:allowBackup="true">\n        <activity\n            android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"\n            android:label="Touchline Manager"\n            android:exported="true">\n            <meta-data android:name="android.support.customapps.trusted.DEFAULT_URL" android:value="https://preview-z.space-z.ai/" />\n            <meta-data android:name="android.support.customapps.trusted.STATUS_BAR_COLOR" android:resource="@color/colorPrimary" />\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN" />\n                <category android:name="android.intent.category.LAUNCHER" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>\n' > $DIR/AndroidManifest.xml
        
        printf '<resources>\n    <string name="app_name">Touchline Manager</string>\n</resources>\n' > $DIR/res/values/strings.xml
        
        printf '<resources>\n    <color name="colorPrimary">#1a3a2a</color>\n</resources>\n' > $DIR/res/values/colors.xml
        
        printf '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/colorPrimary"/>\n    <foreground android:drawable="@color/colorPrimary"/>\n</adaptive-icon>\n' > $DIR/res/mipmap-anydpi-v26/ic_launcher.xml
        
        # PNG ikonu repodan kopyala
        cp android-icon.png $DIR/res/mipmap-hdpi/ic_launcher.png
        
        echo "=== FILES ==="
        find android-app -type f | sort

    - name: Build APK
      run: |
        cd android-app
        /tmp/gradle-8.7/bin/gradle assembleRelease --no-daemon --no-build-cache 2>&1
        find . -name "*.apk" -type f

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: touchline-manager-apk
        path: android-app/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-fail
        path: android-app/
        retention-days: 7
