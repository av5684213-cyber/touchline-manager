name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - run: yes | sdkmanager --licenses || true
    - run: sdkmanager "build-tools;34.0.0" "platforms;android-34"
    
    - name: Install Gradle
      run: |
        cd /tmp
        curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
        unzip -qo gradle.zip
        /tmp/gradle-8.7/bin/gradle --version

    - name: Create Android Project
      run: |
        DIR=android-app/app/src/main
        mkdir -p $DIR/res/values
        mkdir -p $DIR/res/mipmap-anydpi-v26
        mkdir -p $DIR/res/mipmap-hdpi
        mkdir -p $DIR/res/mipmap-mdpi
        mkdir -p $DIR/res/mipmap-xhdpi
        
        printf '%s\n' \
          'pluginManagement {' \
          '    repositories {' \
          '        google()' \
          '        mavenCentral()' \
          '        gradlePluginPortal()' \
          '    }' \
          '}' \
          'dependencyResolutionManagement {' \
          '    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)' \
          '    repositories {' \
          '        google()' \
          '        mavenCentral()' \
          '    }' \
          '}' \
          'rootProject.name = "TouchlineManager"' \
          'include ":app"' > android-app/settings.gradle
        
        printf '%s\n' \
          'plugins {' \
          '    id "com.android.application" version "8.2.0" apply false' \
          '}' > android-app/build.gradle
        
        printf '%s\n' \
          'plugins {' \
          '    id "com.android.application"' \
          '}' \
          'android {' \
          '    namespace "com.touchline.manager"' \
          '    compileSdk 34' \
          '    defaultConfig {' \
          '        applicationId "com.touchline.manager"' \
          '        minSdk 24' \
          '        targetSdk 34' \
          '        versionCode 1' \
          '        versionName "1.0.0"' \
          '    }' \
          '    buildTypes {' \
          '        release {' \
          '            minifyEnabled false' \
          '            signingConfig signingConfigs.debug' \
          '        }' \
          '    }' \
          '}' \
          'dependencies {' \
          "    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'" \
          '}' > android-app/app/build.gradle
        
        printf '%s\n' \
          'android.useAndroidX=true' \
          'org.gradle.jvmargs=-Xmx2048m' \
          'org.gradle.daemon=false' > android-app/gradle.properties
        
        printf '%s\n' \
          '<manifest xmlns:android="http://schemas.android.com/apk/res/android">' \
          '    <application' \
          '        android:label="Touchline Manager"' \
          '        android:icon="@mipmap/ic_launcher"' \
          '        android:theme="@android:style/Theme.Translucent.NoTitleBar"' \
          '        android:allowBackup="true">' \
          '        <activity' \
          '            android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"' \
          '            android:label="Touchline Manager"' \
          '            android:exported="true">' \
          '            <meta-data android:name="android.support.customapps.trusted.DEFAULT_URL" android:value="https://preview-z.space-z.ai/" />' \
          '            <meta-data android:name="android.support.customapps.trusted.STATUS_BAR_COLOR" android:resource="@color/colorPrimary" />' \
          '            <intent-filter>' \
          '                <action android:name="android.intent.action.MAIN" />' \
          '                <category android:name="android.intent.category.LAUNCHER" />' \
          '            </intent-filter>' \
          '        </activity>' \
          '    </application>' \
          '</manifest>' > $DIR/AndroidManifest.xml
        
        printf '%s\n' \
          '<resources>' \
          '    <string name="app_name">Touchline Manager</string>' \
          '    <string name="asset_statements">https://preview-z.space-z.ai/.well-known/assetlinks.json</string>' \
          '</resources>' > $DIR/res/values/strings.xml
        
        printf '%s\n' \
          '<resources>' \
          '    <color name="colorPrimary">#1a3a2a</color>' \
          '</resources>' > $DIR/res/values/colors.xml
        
        printf '%s\n' \
          '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' \
          '    <background android:drawable="@color/colorPrimary"/>' \
          '    <foreground android:drawable="@color/colorPrimary"/>' \
          '</adaptive-icon>' > $DIR/res/mipmap-anydpi-v26/ic_launcher.xml
        
        # Base64 PNG ikon (geçerli 64x64 yeşil)
        echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAC0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAOA1N2AAAdmDj5IAAAAASUVORK5CYII=" | base64 -d > $DIR/res/mipmap-mdpi/ic_launcher.png
        echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAC0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAOA1N2AAAdmDj5IAAAAASUVORK5CYII=" | base64 -d > $DIR/res/mipmap-hdpi/ic_launcher.png
        echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAC0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAOA1N2AAAdmDj5IAAAAASUVORK5CYII=" | base64 -d > $DIR/res/mipmap-xhdpi/ic_launcher.png
        
        echo "=== FILES ==="
        find android-app -type f | sort

    - name: Build APK
      run: |
        cd android-app
        /tmp/gradle-8.7/bin/gradle assembleRelease --no-daemon --no-build-cache --stacktrace 2>&1
        echo "=== APK ==="
        find . -name "*.apk" -type f

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: touchline-manager-apk
        path: android-app/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-fail
        path: android-app/
        retention-days: 7
