name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js (static export)
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # v2.9.13 MADDE 3: Production build — test/debug route'ları derleme
          NEXT_PUBLIC_BUILD_ENV: production

      - name: Debug — check out directory
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== out/ directory contents ==="
          ls -la out/ 2>/dev/null || echo "out/ does not exist!"
          echo "=== out/ size ==="
          du -sh out/ 2>/dev/null || echo "out/ not found"
          echo "=== All directories ==="
          ls -la

      - name: Copy Next.js output to Android assets
        run: |
          rm -rf android-app/app/src/main/assets/web
          mkdir -p android-app/app/src/main/assets/web
          # v2.9.13 MADDE 3: Test/debug sayfalarını out/'tan sil
          rm -rf out/supabase-test out/supabase-test.html out/supabase-test.txt
          rm -rf out/apk-indir out/apk-indir.html
          rm -rf out/apk-data out/apk-data.html
          # v2.9.15 MADDE 1-2-5: Service worker, PWA, offline kalıntılarını sil
          rm -f out/sw.js out/sw-register.js out/manifest.json
          rm -rf out/offline
          rm -rf out/icons
          # v2.9.15 MADDE 4: .map dosyalarını sil (production source map yok)
          find out/ -name "*.map" -delete
          cp -r out/* android-app/app/src/main/assets/web/
          echo "=== Web assets size ==="
          du -sh android-app/app/src/main/assets/web/
          echo "=== File count ==="
          find android-app/app/src/main/assets/web/ -type f | wc -l
          echo "=== .map files remaining? ==="
          find android-app/app/src/main/assets/web/ -name "*.map" | wc -l

      - name: Build APK
        working-directory: android-app
        run: ./gradlew assembleRelease -x lint --no-daemon --console=plain

      - name: v2.9.13 MADDE 6 — Bağımsız güvenlik doğrulaması
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "GÜVENLİK DOĞRULAMASI — v2.9.13"
          echo "═══════════════════════════════════════════════════════════════"
          FAIL=0

          # APK'yı geçici dizine unzip et
          APK="android-app/app/build/outputs/apk/release/app-release.apk"
          TMPDIR=$(mktemp -d)
          unzip -q "$APK" -d "$TMPDIR"

          # (a) AndroidManifest'te usesCleartextTraffic="false" ve allowBackup="false"
          echo ""
          echo "=== (a) Manifest güvenlik kontrolü ==="
          # APK içindeki AndroidManifest.xml binary format'tadır
          # aapt dump badging ile text olarak oku
          AAPT=$(find $ANDROID_HOME -name "aapt2" -o -name "aapt" 2>/dev/null | head -1)
          if [ -z "$AAPT" ]; then
            AAPT=$(find /usr/local/lib/android-sdk -name "aapt2" -o -name "aapt" 2>/dev/null | head -1)
          fi
          if [ -n "$AAPT" ]; then
            MANIFEST_TEXT=$("$AAPT" dump badging "$APK" 2>/dev/null)
            if echo "$MANIFEST_TEXT" | grep -q "usesCleartextTraffic='false'"; then
              echo "  ✅ usesCleartextTraffic=false"
            elif echo "$MANIFEST_TEXT" | grep -q "usesCleartextTraffic: false"; then
              echo "  ✅ usesCleartextTraffic=false"
            else
              echo "  ℹ️ usesCleartextTraffic aapt ile doğrulanamadı (binary XML)"
            fi
            if echo "$MANIFEST_TEXT" | grep -q "allowBackup='false'"; then
              echo "  ✅ allowBackup=false"
            elif echo "$MANIFEST_TEXT" | grep -q "allowBackup: false"; then
              echo "  ✅ allowBackup=false"
            else
              echo "  ℹ️ allowBackup aapt ile doğrulanamadı (binary XML)"
            fi
          else
            echo "  ℹ️ aapt bulunamadı, manifest kontrolü atlanıyor"
          fi

          # (b) assets/web içinde yasaklı string'ler
          echo ""
          echo "=== (b) Yasaklı içerik kontrolü ==="
          ASSETS_DIR="$TMPDIR/assets/web"
          if [ -d "$ASSETS_DIR" ]; then
            FORBIDDEN="supabase-test apk-indir apk-data"
            for term in $FORBIDDEN; do
              if grep -rl "$term" "$ASSETS_DIR" 2>/dev/null; then
                echo "  ❌ '$term' bulundu!"
                FAIL=1
              else
                echo "  ✅ '$term' bulunamadı"
              fi
            done
          else
            echo "  ⚠️ assets/web dizini bulunamadı"
          fi

          # (c) .js dosyalarında service_role veya gizli anahtar deseni
          echo ""
          echo "=== (c) Gizli anahtar kontrolü ==="
          if [ -d "$ASSETS_DIR" ]; then
            # service_role string ara
            if grep -rl "service_role" "$ASSETS_DIR" 2>/dev/null | grep -v ".map"; then
              echo "  ❌ 'service_role' string bulundu!"
              FAIL=1
            else
              echo "  ✅ 'service_role' string bulunamadı"
            fi
            # JWT deseni ara (eyJ ile başlayan uzun string — anon key hariç)
            # anon key public'tir, service_role key ise "service_role" claim'i içerir
            if grep -rlo "eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*" "$ASSETS_DIR" 2>/dev/null | grep -v ".map" | head -3; then
              echo "  ℹ️ JWT token bulundu (anon key olabilir — service_role değil)"
            fi
          fi

          # Temizlik
          rm -rf "$TMPDIR"

          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          if [ $FAIL -eq 0 ]; then
            echo "✅ TÜM GÜVENLİK KONTROLLERİ BAŞARILI"
          else
            echo "❌ GÜVENLİK KONTROLÜ BAŞARISIZ — build fail edilecek"
            exit 1
          fi
          echo "═══════════════════════════════════════════════════════════════"

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/release/app-release.apk
          name: Touchline Manager ${{ github.ref_name }}
          body: |
            ## Touchline Manager ${{ github.ref_name }}

            APK otomatik build edildi (GitHub Actions).

            ### Kurulum
            1. APK'yı telefona indir
            2. "Bilinmeyen kaynaklar" iznini aç
            3. APK'yı kur
            4. Uygulamayı aç → "Geliştirici Modu (Kayıtsız)" butonuna bas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: touchline-manager-apk
          path: android-app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
