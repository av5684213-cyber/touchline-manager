name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js (static export)
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Debug — check out directory
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== out/ directory contents ==="
          ls -la out/ 2>/dev/null || echo "out/ does not exist!"
          echo "=== out/ size ==="
          du -sh out/ 2>/dev/null || echo "out/ not found"
          echo "=== All directories ==="
          ls -la

      - name: Copy Next.js output to Android assets
        run: |
          rm -rf android-app/app/src/main/assets/web
          mkdir -p android-app/app/src/main/assets/web
          cp -r out/* android-app/app/src/main/assets/web/
          # v2.9.12: _next/ → next/ yeniden adlandır
          # Android AAPT varsayılan olarak _ ile başlayan klasörleri atlar
          cd android-app/app/src/main/assets/web
          if [ -d "_next" ]; then
            mv _next next
            # HTML dosyalarındaki _next/ referanslarını next/ olarak güncelle
            find . -name "*.html" -exec sed -i 's|/_next/|/next/|g' {} +
            find . -name "*.html" -exec sed -i 's|"_next/|"next/|g' {} +
            find . -name "*.html" -exec sed -i "s|'_next/|'next/|g" {} +
            # JS dosyalarındaki referanslar
            find next/ -name "*.js" -exec sed -i 's|_next/|next/|g' {} + 2>/dev/null || true
            echo "✓ _next/ → next/ yeniden adlandırıldı"
          fi
          cd -
          echo "=== Web assets size ==="
          du -sh android-app/app/src/main/assets/web/
          echo "=== File count ==="
          find android-app/app/src/main/assets/web/ -type f | wc -l
          echo "=== _next exists? ==="
          ls -d android-app/app/src/main/assets/web/_next 2>/dev/null && echo "STILL EXISTS" || echo "RENAMED OK"
          echo "=== next exists? ==="
          ls -d android-app/app/src/main/assets/web/next 2>/dev/null && echo "EXISTS OK" || echo "MISSING"

      - name: Build APK
        working-directory: android-app
        run: ./gradlew assembleRelease -x lint --no-daemon --console=plain

      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-app/app/build/outputs/apk/release/app-release.apk
          name: Touchline Manager ${{ github.ref_name }}
          body: |
            ## Touchline Manager ${{ github.ref_name }}

            APK otomatik build edildi (GitHub Actions).

            ### Kurulum
            1. APK'yı telefona indir
            2. "Bilinmeyen kaynaklar" iznini aç
            3. APK'yı kur
            4. Uygulamayı aç → "Geliştirici Modu (Kayıtsız)" butonuna bas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: touchline-manager-apk
          path: android-app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
