name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - run: yes | sdkmanager --licenses || true
    - run: sdkmanager "build-tools;34.0.0" "platforms;android-34"
    
    - name: Build Next.js Static Export
      run: |
        npm install
        sed -i 's/output: "standalone"/output: "export"/' next.config.ts
        sed -i 's/output: "standalone",/output: "export",/' next.config.ts
        rm -rf src/app/api src/app/download
        grep output next.config.ts
        npx next build
        ls -la out/
        find out -type f | head -10
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    
    - name: Install Gradle
      run: |
        cd /tmp
        curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
        unzip -qo gradle.zip
        /tmp/gradle-8.7/bin/gradle --version

    - name: Create WebView APK with embedded app
      run: |
        DIR=android-app/app/src/main
        mkdir -p $DIR/res/values
        mkdir -p $DIR/res/mipmap-hdpi
        mkdir -p $DIR/java/com/touchline/manager
        mkdir -p $DIR/assets/web
        
        # Static export çıktısını assets'e kopyala
        cp -r out/* $DIR/assets/web/
        echo "=== Assets ==="
        find $DIR/assets/web -type f | wc -l
        du -sh $DIR/assets/web
        
        printf 'pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\nrootProject.name = "TouchlineManager"\ninclude ":app"\n' > android-app/settings.gradle
        
        printf 'plugins {\n    id "com.android.application" version "8.2.0" apply false\n}\n' > android-app/build.gradle
        
        printf 'plugins {\n    id "com.android.application"\n}\nandroid {\n    namespace "com.touchline.manager"\n    compileSdk 34\n    defaultConfig {\n        applicationId "com.touchline.manager"\n        minSdk 24\n        targetSdk 34\n        versionCode 1\n        versionName "1.0.0"\n    }\n    buildTypes {\n        release {\n            minifyEnabled false\n            signingConfig signingConfigs.debug\n        }\n    }\n}\n' > android-app/app/build.gradle
        
        printf 'android.useAndroidX=true\norg.gradle.jvmargs=-Xmx2048m\norg.gradle.daemon=false\n' > android-app/gradle.properties
        
        printf '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET" />\n    <application\n        android:label="Touchline Manager"\n        android:icon="@mipmap/ic_launcher"\n        android:theme="@android:style/Theme.NoTitleBar.Fullscreen"\n        android:allowBackup="true"\n        android:usesCleartextTraffic="true">\n        <activity\n            android:name=".MainActivity"\n            android:label="Touchline Manager"\n            android:exported="true"\n            android:configChanges="orientation|screenSize">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN" />\n                <category android:name="android.intent.category.LAUNCHER" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>\n' > $DIR/AndroidManifest.xml
        
        printf '<resources>\n    <string name="app_name">Touchline Manager</string>\n</resources>\n' > $DIR/res/values/strings.xml
        
        printf '<resources>\n    <color name="colorPrimary">#1a3a2a</color>\n</resources>\n' > $DIR/res/values/colors.xml
        
        # WebView — assets'ten yükle, Supabase API'ye internet erişimi
        printf 'package com.touchline.manager;\n\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.webkit.WebView;\nimport android.webkit.WebViewClient;\n\npublic class MainActivity extends Activity {\n    private WebView webView;\n\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        webView = new WebView(this);\n        setContentView(webView);\n        webView.getSettings().setJavaScriptEnabled(true);\n        webView.getSettings().setDomStorageEnabled(true);\n        webView.getSettings().setAllowFileAccess(true);\n        webView.getSettings().setDatabaseEnabled(true);\n        webView.setWebViewClient(new WebViewClient());\n        webView.loadUrl("file:///android_asset/web/index.html");\n    }\n\n    @Override\n    public void onBackPressed() {\n        if (webView.canGoBack()) {\n            webView.goBack();\n        } else {\n            super.onBackPressed();\n        }\n    }\n}\n' > $DIR/java/com/touchline/manager/MainActivity.java
        
        # PNG ikonu repodan kopyala
        cp android-icon.png $DIR/res/mipmap-hdpi/ic_launcher.png
        
        echo "=== Project structure ==="
        find android-app -type f | wc -l

    - name: Build APK
      run: |
        cd android-app
        /tmp/gradle-8.7/bin/gradle assembleRelease --no-daemon --no-build-cache 2>&1
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/release/*.apk 2>/dev/null

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: touchline-manager-apk
        path: android-app/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
    
    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-fail
        path: android-app/
        retention-days: 7
