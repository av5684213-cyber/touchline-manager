name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - run: yes | sdkmanager --licenses || true
    - run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

    - name: Build Next.js Static Export
      run: |
        npm install
        # next.config.ts'e output: "export" ekle (yoksa)
        if ! grep -q 'output:' next.config.ts; then
          sed -i 's/const nextConfig: NextConfig = {/const nextConfig: NextConfig = {\n  output: "export",/' next.config.ts
        fi
        # API route'ları kaldır (static export desteklemiyor)
        rm -rf src/app/api src/app/download
        echo "=== next.config.ts ==="
        cat next.config.ts
        
        # Next.js 16'da Turbopack default. Webpack'e zorlamak için:
        # 1) --webpack flag (Next 16 destekliyorsa)
        # 2) NEXT_BUILD_USE_TURBOPACK=0 env var
        # Her ikisini de deneyelim. tee her zaman çalışsın diye || true
        
        echo "=== Building with webpack ==="
        NEXT_BUILD_USE_TURBOPACK=0 npx next build 2>&1 | tee /tmp/nextjs-build.log || true
        
        # Build başarılı mı kontrol et
        if [ ! -d "out" ]; then
          echo "ERROR: out/ directory not found. Build likely failed."
          echo "=== Last 100 lines of build log ==="
          tail -100 /tmp/nextjs-build.log
          exit 1
        fi
        
        echo "=== Static export ==="
        ls -la out/
        du -sh out/
        find out -type f | wc -l
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        NODE_ENV: production

    - name: Upload Next.js build log (always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nextjs-build-log
        path: /tmp/nextjs-build.log
        retention-days: 7

    - name: Copy static export into Android assets
      run: |
        # Static export çıktısını APK assets'e kopyala
        rm -rf android-app/app/src/main/assets/web/*
        cp -r out/* android-app/app/src/main/assets/web/
        echo "=== Assets ==="
        find android-app/app/src/main/assets/web -type f | wc -l
        du -sh android-app/app/src/main/assets/web

    - name: Install Gradle
      run: |
        cd /tmp
        curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
        unzip -qo gradle.zip
        /tmp/gradle-8.7/bin/gradle --version

    - name: Build APK
      run: |
        cd android-app
        /tmp/gradle-8.7/bin/gradle assembleRelease --no-daemon --no-build-cache --stacktrace 2>&1 | tee /tmp/gradle.log
        echo "=== APK files ==="
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/release/*.apk 2>/dev/null
        du -sh app/build/outputs/apk/release/*.apk 2>/dev/null

    - name: Upload Gradle log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-log
        path: /tmp/gradle.log
        retention-days: 7

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: touchline-manager-apk
        path: android-app/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-fail-debug
        path: |
          android-app/
          out/
        retention-days: 7
