name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: android-actions/setup-android@v3
    - run: yes | sdkmanager --licenses || true
    - run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

    - name: Install dependencies
      run: |
        # Node 24 + React 19 + Next 16 peer dep冲突 fix
        npm install --legacy-peer-deps 2>&1 | tee /tmp/npm-install.log
        echo "=== npm install exit: ${PIPESTATUS[0]} ==="
      env:
        NODE_ENV: development

    - name: Build Next.js Static Export
      run: |
        # next.config.ts'e output: "export" ekle (yoksa)
        if ! grep -q 'output:' next.config.ts; then
          sed -i 's/const nextConfig: NextConfig = {/const nextConfig: NextConfig = {\n  output: "export",/' next.config.ts
        fi
        # API route'ları kaldır (static export desteklemiyor)
        rm -rf src/app/api src/app/download
        echo "=== next.config.ts ==="
        cat next.config.ts

        # Next.js 16'da Turbopack default. Webpack'e zorla.
        echo "=== Building with webpack ==="
        NEXT_BUILD_USE_TURBOPACK=0 npx next build 2>&1 | tee /tmp/nextjs-build.log
        BUILD_EXIT=${PIPESTATUS[0]}
        echo "=== build exit: $BUILD_EXIT ==="

        if [ ! -d "out" ] || [ "$BUILD_EXIT" != "0" ]; then
          echo "ERROR: Build failed or out/ missing"
          echo "=== Last 200 lines of build log ==="
          tail -200 /tmp/nextjs-build.log
          exit 1
        fi

        echo "=== Static export ==="
        ls -la out/
        du -sh out/
        find out -type f | wc -l
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        NODE_ENV: production

    - name: Upload build logs (always)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          /tmp/npm-install.log
          /tmp/nextjs-build.log
        retention-days: 7

    - name: Copy static export into Android assets
      run: |
        # Static export çıktısını APK assets'e kopyala
        rm -rf android-app/app/src/main/assets/web
        mkdir -p android-app/app/src/main/assets/web
        cp -r out/* android-app/app/src/main/assets/web/
        # Güvenlik: assets içinde .apk dosyası varsa sil
        find android-app/app/src/main/assets/web -name "*.apk" -delete
        echo "=== Assets content ==="
        find android-app/app/src/main/assets/web -type f | wc -l
        du -sh android-app/app/src/main/assets/web
        echo "=== index.html exists? ==="
        ls -la android-app/app/src/main/assets/web/index.html
        echo "=== _next folder? ==="
        ls android-app/app/src/main/assets/web/_next/ 2>&1 | head -5
        # Kritik: assets boşsa build'i durdur
        if [ ! -f "android-app/app/src/main/assets/web/index.html" ]; then
          echo "FATAL: index.html missing in assets — build will produce empty APK"
          exit 1
        fi

    - name: Install Gradle
      run: |
        cd /tmp
        curl -sL https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
        unzip -qo gradle.zip
        /tmp/gradle-8.7/bin/gradle --version

    - name: Build APK
      run: |
        cd android-app
        # Build öncesi assets'in dolu olduğunu tekrar doğrula
        echo "=== Pre-build assets check ==="
        find app/src/main/assets/web -type f | wc -l
        du -sh app/src/main/assets/web
        # Eski APK'ları temizle
        rm -rf app/build/outputs/apk
        /tmp/gradle-8.7/bin/gradle assembleRelease --no-daemon --no-build-cache --stacktrace 2>&1 | tee /tmp/gradle.log
        GRADLE_EXIT=${PIPESTATUS[0]}
        echo "=== gradle exit: $GRADLE_EXIT ==="
        echo "=== APK files ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null
        ls -la app/build/outputs/apk/release/*.apk 2>/dev/null
        du -sh app/build/outputs/apk/release/*.apk 2>/dev/null
        if [ "$GRADLE_EXIT" != "0" ] || [ ! -f "app/build/outputs/apk/release/app-release.apk" ]; then
          echo "ERROR: Gradle build failed or APK not found"
          tail -100 /tmp/gradle.log
          exit 1
        fi
        # APK boyutu kontrolü — 28 KB ise assets paketlenmemiş demektir
        APK_SIZE=$(stat -c%s app/build/outputs/apk/release/app-release.apk)
        echo "=== APK size: $APK_SIZE bytes ==="
        if [ "$APK_SIZE" -lt 100000 ]; then
          echo "FATAL: APK too small ($APK_SIZE bytes) — assets not packaged"
          echo "Checking assets in APK..."
          unzip -l app/build/outputs/apk/release/app-release.apk | grep assets | head -20
          exit 1
        fi

    - name: Upload Gradle log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-log
        path: /tmp/gradle.log
        retention-days: 7

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: touchline-manager-apk
        path: android-app/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-fail-debug
        path: |
          android-app/
          out/
        retention-days: 7
